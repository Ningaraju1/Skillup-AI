<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkillUp AI - Where Ambition Meets Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      #app-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: #070a13;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        transition: opacity 0.4s ease-out;
        opacity: 1;
      }
      .loader-content {
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .loader-logo {
        color: #6366f1;
        filter: drop-shadow(0 0 10px rgba(99, 102, 241, 0.4));
        animation: spin-glow 2s infinite ease-in-out;
        margin-bottom: 20px;
      }
      .loader-title {
        font-family: 'Outfit', sans-serif;
        font-size: 2.25rem;
        font-weight: 800;
        margin: 0 0 8px 0;
        background: linear-gradient(135deg, #6366f1, #a855f7);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: -0.025em;
      }
      .loader-subtitle {
        font-family: 'Outfit', sans-serif;
        font-size: 0.9rem;
        color: #9ca3af;
        margin: 0 0 24px 0;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }
      .loader-bar-container {
        width: 180px;
        height: 4px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 2px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.03);
      }
      .loader-bar {
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, #6366f1, #a855f7);
        transform: translateX(-100%);
        animation: loading-progress 1.5s infinite cubic-bezier(0.4, 0, 0.2, 1);
      }
      @keyframes spin-glow {
        0%, 100% {
          transform: scale(1);
          filter: drop-shadow(0 0 10px rgba(99, 102, 241, 0.4)) drop-shadow(0 0 20px rgba(168, 85, 247, 0.2));
        }
        50% {
          transform: scale(1.12);
          filter: drop-shadow(0 0 20px rgba(99, 102, 241, 0.8)) drop-shadow(0 0 35px rgba(168, 85, 247, 0.5));
        }
      }
      @keyframes loading-progress {
        0% {
          transform: translateX(-100%);
        }
        50% {
          transform: translateX(0);
        }
        100% {
          transform: translateX(100%);
        }
      }
    </style>
  </head>
  <body>
    <div id="app-loader">
      <div class="loader-content">
        <svg class="loader-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="48" height="48">
          <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/>
          <path d="M14 2v4a2 2 0 0 0 2 2h4"/>
          <path d="M10 9H8"/>
          <path d="M16 13H8"/>
          <path d="M16 17H8"/>
        </svg>
        <h1 class="loader-title">SkillUp AI</h1>
        <p class="loader-subtitle">Where Ambition Meets Intelligence</p>
        <div class="loader-bar-container">
          <div class="loader-bar"></div>
        </div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
