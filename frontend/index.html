<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkillUp AI - Where Ambition Meets Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      #app-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: #05070f;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        opacity: 1;
        overflow: hidden;
      }
      #app-loader::before {
        content: '';
        position: absolute;
        width: 150%;
        height: 150%;
        background-image: 
          radial-gradient(rgba(99, 102, 241, 0.04) 1px, transparent 1px),
          radial-gradient(rgba(168, 85, 247, 0.04) 1.5px, transparent 1.5px);
        background-size: 40px 40px, 60px 60px;
        background-position: 0 0, 30px 30px;
        animation: drift 60s infinite linear;
        z-index: 1;
      }
      .loader-content {
        position: relative;
        z-index: 2;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }
      .hologram-container {
        position: relative;
        width: 140px;
        height: 140px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 12px;
      }
      .hologram-core {
        position: absolute;
        width: 44px;
        height: 44px;
        background: radial-gradient(circle, #a855f7 0%, #6366f1 70%, transparent 100%);
        border-radius: 50%;
        filter: blur(4px) drop-shadow(0 0 15px #6366f1);
        animation: pulse-liquid 3s infinite ease-in-out;
      }
      .hologram-ring {
        position: absolute;
        border-radius: 50%;
        border: 1px dashed rgba(99, 102, 241, 0.35);
        box-shadow: 0 0 12px rgba(99, 102, 241, 0.08);
      }
      .ring-1 {
        width: 90px;
        height: 90px;
        animation: rotate-3d-x 4s infinite linear;
      }
      .ring-2 {
        width: 115px;
        height: 115px;
        border-style: solid;
        border-color: rgba(168, 85, 247, 0.2);
        border-top-color: #a855f7;
        animation: rotate-3d-y 6s infinite linear;
      }
      .ring-3 {
        width: 140px;
        height: 140px;
        border-style: dotted;
        border-color: rgba(16, 185, 129, 0.25);
        animation: rotate-3d-z 8s infinite linear;
      }
      .loader-title {
        font-family: 'Outfit', sans-serif;
        font-size: 2.5rem;
        font-weight: 900;
        margin: 0;
        background: linear-gradient(135deg, #f3f4f6 30%, #6366f1, #a855f7);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: -0.03em;
        text-shadow: 0 0 40px rgba(99, 102, 241, 0.2);
        animation: title-float 3s infinite ease-in-out;
      }
      .terminal-logs {
        font-family: 'Courier New', Courier, monospace;
        font-size: 0.75rem;
        color: #6ee7b7;
        text-align: left;
        width: 270px;
        height: 92px;
        background: rgba(0, 0, 0, 0.45);
        border: 1px solid rgba(255, 255, 255, 0.04);
        padding: 12px 16px;
        border-radius: 8px;
        box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.8);
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .log-line {
        opacity: 0;
        transform: translateY(4px);
        transition: all 0.3s ease;
        white-space: nowrap;
        overflow: hidden;
        border-right: 2px solid transparent;
      }
      .log-line.active {
        opacity: 1;
        transform: translateY(0);
      }
      .log-line.typing {
        border-right-color: #6ee7b7;
        animation: blink-cursor 0.8s infinite step-end;
      }
      @keyframes drift {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes pulse-liquid {
        0%, 100% { transform: scale(1); opacity: 0.8; }
        50% { transform: scale(1.15); opacity: 1; }
      }
      @keyframes rotate-3d-x {
        0% { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
        100% { transform: rotateX(360deg) rotateY(180deg) rotateZ(360deg); }
      }
      @keyframes rotate-3d-y {
        0% { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
        100% { transform: rotateX(180deg) rotateY(360deg) rotateZ(360deg); }
      }
      @keyframes rotate-3d-z {
        0% { transform: rotateZ(0deg) rotateX(45deg); }
        100% { transform: rotateZ(-360deg) rotateX(45deg); }
      }
      @keyframes title-float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-4px); }
      }
      @keyframes blink-cursor {
        from, to { border-color: transparent }
        50% { border-color: #6ee7b7; }
      }
    </style>
  </head>
  <body>
    <div id="app-loader">
      <div class="loader-content">
        <div class="hologram-container">
          <div class="hologram-core"></div>
          <div class="hologram-ring ring-1"></div>
          <div class="hologram-ring ring-2"></div>
          <div class="hologram-ring ring-3"></div>
        </div>
        <h1 class="loader-title">SkillUp AI</h1>
        <div class="terminal-logs">
          <div class="log-line" id="log-1">> Booting compliance engine...</div>
          <div class="log-line" id="log-2">> Connecting Groq cluster...</div>
          <div class="log-line" id="log-3">> Mounting vector memory...</div>
          <div class="log-line" id="log-4">> Syncing AI Recopilot...</div>
        </div>
      </div>
    </div>
    <script>
      (function() {
        const delays = [200, 800, 1500, 2100];
        delays.forEach((delay, idx) => {
          setTimeout(() => {
            const line = document.getElementById(`log-${idx + 1}`);
            if (line) {
              line.classList.add('active', 'typing');
              setTimeout(() => {
                line.classList.remove('typing');
              }, 500);
            }
          }, delay);
        });
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
